# fly.toml app configuration file generated for assistant-ui-fi on 2026-05-01T10:18:30Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'assistant-ui-fi'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '3000'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
